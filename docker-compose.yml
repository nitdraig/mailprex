services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mailprex_mongo:/data/db
    ports:
      - "27017:27017"

  api:
    build:
      context: ./back
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./back/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/mailprex
      MAILPREX_MODE: selfhost
      PORT: "5000"
    depends_on:
      - mongo

volumes:
  mailprex_mongo:
